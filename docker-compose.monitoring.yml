services:
  newrelic-infra:
    image: newrelic/infrastructure:latest
    container_name: autoaudit-newrelic-infra
    network_mode: host
    privileged: true
    pid: host
    cgroup: host
    environment:
      NRIA_LICENSE_KEY: ${NEW_RELIC_LICENSE_KEY}
      NRIA_DISPLAY_NAME: autoaudit-jenkins-host
      NRIA_CUSTOM_ATTRIBUTES: '{"environment":"production","service":"autoaudit-backend-api","pipeline":"jenkins"}'
    volumes:
      - "/:/host:ro"
      - "/proc:/host/proc:ro"
      - "/sys:/host/sys:ro"
      - "/var/run/docker.sock:/var/run/docker.sock"
    restart: unless-stopped

